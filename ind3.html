<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Индивидуальное задание 3</title>
</head>
<body>
    <h1>Индивидуальное задание 3</h1>
    <p>Скрипт спрашивает возраст и просит его подтвердить.</p>

    <script>
        let age;
        let answer = false;

        while (answer === false) {
            age = prompt("Сколько вам лет?", "Введите возраст");

            if (age === null) {
                continue;
            }

            answer = confirm("Вам точно " + age + " лет?");
        }

        alert("Спасибо! Ваш возраст: " + age);
    </script>
</body>
</html>
