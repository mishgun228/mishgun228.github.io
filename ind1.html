<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Индивидуальное задание 1</title>
</head>
<body>
    <h1>Индивидуальное задание 1</h1>
    <p>Нахождение минимума двух чисел.</p>

    <script>
        function min(a, b) {
            if (a < b) {
                return a;
            } else {
                return b;
            }
        }

        let num1 = 8;
        let num2 = 3;

        alert("Минимум из чисел " + num1 + " и " + num2 + " = " + min(num1, num2));
    </script>
</body>
</html>
